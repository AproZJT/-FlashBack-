server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s

flashback:
  jwt:
    secret: "FlashBack_ChangeThisSecretForProduction_AtLeast32Bytes"
    expire-seconds: 604800
  feature:
    enable-v2-schedule: false
    enable-offline-sync: false
    enable-media-fields: false
    enable-metrics: true
